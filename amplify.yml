version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        # Write the Amplify variables to a .env file
        - echo "VITE_USER_TABLE=$VITE_USER_TABLE" >> .env
        - echo "VITE_BATCH_UN_LAMBDA=$VITE_BATCH_UN_LAMBDA" >> .env
    build:
      commands:
        - cat .env # Verify .env contents
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
